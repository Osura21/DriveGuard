<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003B7E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052A3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="12" fill="url(#bgGradient)"/>
  
  <!-- Car body simplified -->
  <g transform="translate(50, 50)">
    <!-- Car silhouette -->
    <path d="M -20 -5 L -25 8 L -22 18 L 22 18 L 25 8 L 20 -5 Q 0 -12 -20 -5" 
          fill="#FFFFFF" opacity="0.95"/>
    
    <!-- Windshield -->
    <path d="M -12 -2 L -15 5 L 0 3 L 15 5 L 12 -2" 
          fill="#E63946" opacity="0.8"/>
    
    <!-- Wheels -->
    <circle cx="-15" cy="18" r="4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="15" cy="18" r="4" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Shield accent -->
    <path d="M 0 -10 L 8 -4 L 8 2 Q 0 6 -8 2 L -8 -4 Z" 
          fill="none" stroke="#E63946" stroke-width="1.2"/>
  </g>
</svg>